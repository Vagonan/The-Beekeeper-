function HiveTower({hive,size,levelData,hideSymbols,hasQueenExcl,hasPropolisSieve}){

      const isF=idx===disp.length-1,hh=isF?fH:sH;
      if(isF&&disp.length>1)yOff+=GAP;

function BroodHoneyGrid({hive,levelData,size}){

    const ld=levelData[origIdx]||{};

function getActiveActionLabels(actions){
  if(!actions||typeof actions!=="object")return[];
  const std=ACTIONS.filter(a=>actions[a.key]).map(a=>{
    const val=actions[a.key+"_val"];const sel=actions[a.key+"_sel"];
    let label=a.label;
    if(a.hasNum&&val)label+=" "+val;
    if(a.hasMerge&&val)label+=" #"+val;
    if((a.hasSelect||a.hasInlineSelect)&&sel)label=(a.key==="swarm"||a.key==="treatment")?a.label:sel; // keep base label for swarm/treatment
    if(a.hasLocation&&val)label=a.label+": "+val;
    return label;
  });
  const cx=[];
  // Check both global registry and per-inspection stored items
  ACTION_GROUPS.forEach(grp=>{
    // Try global custom registry first (from localStorage)
    try{const stored=localStorage.getItem("bk_custom_actions");const gc=stored?JSON.parse(stored):{};(gc[grp.num]||[]).forEach(item=>{if(actions[item.key])cx.push(item.label);});}catch{}
  });
  // Deduplicate
  const all=[...std,...cx];
  return all.filter((v,i)=>all.indexOf(v)===i);
}

function HiveForm({onSave,onCancel,initial,inlineMode,onDelete}){
  const initLevels=()=>{
    if(initial&&initial.levels&&initial.levels.length>0){
      // migrate old levels without type
      return initial.levels.map((l,i)=>Object.assign({type:i===0?"floor":"roof"},l));
    }
    return [{type:"floor",label:"Πάτωμα 1",maxFrames:10,color:"",symbolShape:"Κύκλος",symbolColor:"",symbolNumber:""}];
  };
  const [f,setF]=useState(initial?Object.assign({},initial,{levels:initLevels()}):{
    location:"",description:"",symbolShape:"",symbolColor:"",symbolNumber:"",
    levels:[{type:"floor",label:"Πάτωμα 1",maxFrames:10,color:"",symbolShape:"Κύκλος",symbolColor:"",symbolNumber:""}],
    notes:"",since:today()

  const set=k=>v=>setF(p=>Object.assign({},p,{[k]:v}));
  const setLv=(idx,upd)=>setF(p=>({...p,levels:p.levels.map((l,i)=>i===idx?Object.assign({},l,upd):l)}));
  // Auto-save when levels change in inlineMode
  const isFirst=useRef(true);
  useEffect(()=>{
    if(!inlineMode)return;
    if(isFirst.current){isFirst.current=false;return;}
    const fl=f.levels.filter(l=>l.type==="floor");
    const sv=Object.assign({},f,{symbolShape:fl[0]&&fl[0].symbolShape||"",symbolColor:fl[0]&&fl[0].symbolColor||"",symbolNumber:fl[0]&&fl[0].symbolNumber||""});
    onSave(sv);

  const [showSym,setShowSym]=useState(false);

  ),
  // Max frames + color

          inp({type:"number",min:1,max:40,value:lv.maxFrames||"",onChange:e=>setLv(idx,{maxFrames:+e.target.value}),

function GlobalSummaryPanel({hives,insps,onClose,asView}){
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");

  function totalBrood(insp){
    if(insp&&insp.levelData&&insp.levelData.length>0)return insp.levelData.reduce((s,l)=>s+(+l.brood||0),0);
    return insp?+insp.brood||0:0;
  }
  function totalHoney(insp){
    if(insp&&insp.levelData&&insp.levelData.length>0)return insp.levelData.reduce((s,l)=>s+(+l.honey||0),0);
    return insp?+insp.honey||0:0;
  }
  function lastInspOnOrBefore(hiveId,date){
    return insps.filter(i=>i.hiveId===hiveId&&i.date<=date).sort((a,b)=>b.date.localeCompare(a.date))[0]||null;
  }

  // All unique dates sorted asc
  const allDates=[...new Set(insps.map(i=>i.date).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  // Show last 10 by default; if filter active show filtered
  const hasFilter=dateFrom||dateTo;
  const filteredDates=hasFilter
    ?allDates.filter(d=>(!dateFrom||d>=dateFrom)&&(!dateTo||d<=dateTo))
    :allDates.slice(-10);

  const locations=[...new Set(hives.map(h=>h.location||"Χωρίς τοποθεσία"))];

  const dateData=filteredDates.map(date=>{
    const hiveData=hives.map(hv=>{
      const insp=lastInspOnOrBefore(hv.id,date);
      return{hv,b:totalBrood(insp),h:totalHoney(insp)};
    });
    const locDist=locations.map(loc=>{
      const locH=hiveData.filter(x=>(x.hv.location||"Χωρίς τοποθεσία")===loc);
      const broodDist={},honeyDist={};
      locH.forEach(({b,h})=>{if(b>0)broodDist[b]=(broodDist[b]||0)+1;if(h>0)honeyDist[h]=(honeyDist[h]||0)+1;});
      return{loc,broodDist,honeyDist};
    });
    const broodDistAll={},honeyDistAll={};
    hiveData.forEach(({b,h})=>{if(b>0)broodDistAll[b]=(broodDistAll[b]||0)+1;if(h>0)honeyDistAll[h]=(honeyDistAll[h]||0)+1;});
    return{date,locDist,broodDistAll,honeyDistAll};
  });

  const allBroodVals=[...new Set(dateData.flatMap(d=>Object.keys(d.broodDistAll).map(Number)))].sort((a,b)=>a-b);
  const allHoneyVals=[...new Set(dateData.flatMap(d=>Object.keys(d.honeyDistAll).map(Number)))].sort((a,b)=>a-b);

  const COL=24, LABEL=34;

  // Short date: 14/5/26
  const MN=["Ιαν","Φεβ","Μάρ","Απρ","Μάι","Ιούν","Ιούλ","Αύγ","Σεπ","Οκτ","Νοε","Δεκ"];
  function shortDate(d){
    if(!d)return"";
    const[y,m,day]=d.split("-");
    return day+"/"+MN[parseInt(m)-1]+"/"+y.slice(2);
  }

  const ColHdr=({date,ci})=>div({style:{
    minWidth:COL,width:COL,flexShrink:0,
    background:ci%2===1?"#FDE8B0":"#E8F0E4",
    borderBottom:"2px solid "+G.waxDark,
    padding:"3px 1px 4px",
    display:"flex",alignItems:"flex-end",justifyContent:"center",
  }},div({style:{
    writingMode:"vertical-rl",
    transform:"rotate(180deg)",
    fontSize:8,fontWeight:600,color:G.text,
    lineHeight:1,whiteSpace:"nowrap",
  }},shortDate(date)));

  const RowLbl=({label})=>div({style:{width:LABEL,flexShrink:0,fontSize:10,fontWeight:700,color:G.bark,
    textAlign:"right",padding:"3px 5px 3px 0",lineHeight:1.3,
    borderRight:"2px solid "+G.waxDark}},label);

  const Cell=({val,ci})=>div({style:{
    minWidth:COL,width:COL,flexShrink:0,textAlign:"center",
    fontSize:11,fontWeight:700,
    color:val>0?G.amber:"#D1D5DB",
    padding:"3px 2px",lineHeight:1.3,
    background:ci%2===1?"#FDE8B0":"#E8F0E4",
  }},val>0?val:"-");

  const TableSection=(emoji,color,allVals,getDistFn,isBrood)=>allVals.length===0?null:div({style:{marginBottom:14}},
    ...locations.map(loc=>{
      const rows=allVals.map(val=>{
        const rowData=dateData.map(dd=>{const ld=dd.locDist.find(x=>x.loc===loc);return getDistFn(ld,val);});
        if(rowData.every(v=>v===0))return null;
        return div({key:val,style:{display:"flex",gap:0,alignItems:"center",borderTop:"1px solid "+G.waxDark+"33"}},
          h(RowLbl,{label:val+emoji}),
          ...dateData.map(({date,locDist},ci)=>{const ld=locDist.find(x=>x.loc===loc);const v=getDistFn(ld,val);return h(Cell,{key:date,val:v,ci});})
        );
      }).filter(Boolean);
      if(rows.length===0)return null;
      // Total row per date
      const totalRow=div({style:{display:"flex",gap:0,alignItems:"center",borderTop:"2px solid "+G.waxDark,background:G.waxDark+"22"}},
        div({style:{width:LABEL,flexShrink:0,fontSize:9,fontWeight:800,color:G.textLight,textAlign:"right",padding:"3px 5px 3px 0",borderRight:"2px solid "+G.waxDark}},"Σύν."),
        ...dateData.map(({date,locDist},ci)=>{
          const ld=locDist.find(x=>x.loc===loc);
          const tot=ld?(isBrood?Object.entries(ld.broodDist||{}).reduce((s,[v,n])=>s+(+v)*(+n),0):Object.entries(ld.honeyDist||{}).reduce((s,[v,n])=>s+(+v)*(+n),0)):0;
          return div({key:date,style:{minWidth:COL,width:COL,flexShrink:0,textAlign:"center",fontSize:10,fontWeight:800,color:tot>0?G.amber:G.textLight+"88",padding:"3px 2px",background:ci%2===1?"#FDE8B0":"#E8F0E4"}},tot>0?tot:"-");
        })
      );
      return div({key:loc,style:{display:"flex",gap:0,marginBottom:4,alignItems:"stretch"}},
        div({style:{
          writingMode:"vertical-rl",transform:"rotate(180deg)",fontSize:9,fontWeight:800,color:G.amber,
          flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
          width:16,marginRight:2,letterSpacing:.5,
          borderLeft:"2px solid "+G.honey+"66",
        }},loc),
        div({style:{flex:1}},...rows,totalRow)
      );
    }).filter(Boolean)
  );

  return div({style:asView?{padding:"0 0 20px",background:G.wax,minHeight:"100%"}:{position:"fixed",inset:0,zIndex:600,background:"#0006",display:"flex",alignItems:"flex-end",justifyContent:"center"}},
    div({style:asView?{padding:"8px 4px"}:{background:G.white,borderRadius:"20px 20px 0 0",padding:"14px 16px 40px",width:"100%",maxWidth:720,maxHeight:"85vh",overflowY:"auto",boxShadow:"0 -8px 32px #0004"}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},
        div({style:{fontWeight:900,fontSize:16,color:G.amber}},"🥚🍯 Σύνοψη Γόνου & Μελιών"),
        asView?null:asView?null:btn({onClick:onClose,style:{background:G.waxDark,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:14,color:G.bark}},"✕")
      ),
      // Table
      dateData.length===0?div({style:{textAlign:"center",padding:20,color:G.textLight}},"Δεν υπάρχουν δεδομένα"):
      div({style:{overflowX:"auto"}},
        // Header row (sticky)
        div({style:{display:"flex",gap:0,marginBottom:0,position:"sticky",top:0,background:G.wax,zIndex:2,borderBottom:"none",marginTop:0}},
          div({style:{width:LABEL+18,flexShrink:0}}),
          ...dateData.map(({date},ci)=>h(ColHdr,{key:date,date,ci}))
        ),
        TableSection("🥚",G.bark,allBroodVals,(ld,v)=>ld?ld.broodDist[v]||0:0,true),
        div({style:{height:8,borderTop:"2px solid "+G.waxDark,marginBottom:4}}),
        TableSection("🍯",G.amber,allHoneyVals,(ld,v)=>ld?ld.honeyDist[v]||0:0,false)
      ),
      // Date filter at bottom — compact
      div({style:{display:"flex",gap:6,alignItems:"center",marginTop:12,flexWrap:"wrap"}},
        span({style:{fontSize:10,color:G.textLight,whiteSpace:"nowrap"}}),
        hasFilter?null:span({style:{fontSize:9,color:G.textLight}},"Τελ. "+filteredDates.length+" επιθ."),
        h("input",{type:"date",value:dateFrom,onChange:e=>setDateFrom(e.target.value),style:{
          padding:"3px 6px",borderRadius:6,border:"1px solid "+G.waxDark,background:G.wax,
          fontSize:10,color:G.text,fontFamily:"Georgia,serif",outline:"none",flex:1,minWidth:100
        }}),
        span({style:{fontSize:10,color:G.textLight}},"—"),
        h("input",{type:"date",value:dateTo,onChange:e=>setDateTo(e.target.value),style:{
          padding:"3px 6px",borderRadius:6,border:"1px solid "+G.waxDark,background:G.wax,
          fontSize:10,color:G.text,fontFamily:"Georgia,serif",outline:"none",flex:1,minWidth:100
        }}),
        hasFilter?btn({onClick:()=>{setDateFrom("");setDateTo("");},style:{background:"none",border:"none",cursor:"pointer",fontSize:12,color:G.textLight,padding:"0 2px"}},"✕"):null
      )
    )
  )
}

// InspStats — inspection statistics view
function InspStats({insps,hives}){
  if(!insps.length)return div({style:{textAlign:"center",padding:40,color:G.textLight}},
    div({style:{fontSize:40,marginBottom:8}},"📭"),
    div({},"Δεν υπάρχουν επιθεωρήσεις")
  );

  // last inspection per hive
  const lastPerHive=hives.map(h=>{
    const l=insps.filter(i=>i.hiveId===h.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
    return{hive:h,insp:l};
  }).filter(x=>x.insp);

  const lastInspsOnly=lastPerHive.map(x=>x.insp);
  // unique inspection dates (each date = 1 επιθεώρηση regardless of how many hives)
  const uniqueDates=[...new Set(insps.map(i=>i.date).filter(Boolean))];
  const tm=new Date().toISOString().slice(0,7);
  const monthCount=uniqueDates.filter(d=>d.startsWith(tm)).length;

  // mood distribution — last insp per hive only
  const moods={};
  lastInspsOnly.forEach(i=>{if(i.mood)moods[i.mood]=(moods[i.mood]||0)+1});

  // actions — last insp per hive only
  const actionTotals={};
  lastInspsOnly.forEach(i=>{
    if(!i.actions||typeof i.actions!=="object")return;
    // standard actions
    ACTIONS.forEach(a=>{
      if(i.actions[a.key]){
        let label=a.label;
        if(a.hasNum&&i.actions[a.key+"_val"])label+=" "+i.actions[a.key+"_val"];
        if(a.hasMerge&&i.actions[a.key+"_val"])label+=" #"+i.actions[a.key+"_val"];
        if(a.hasSelect&&i.actions[a.key+"_sel"])label=i.actions[a.key+"_sel"];
        actionTotals[label]=(actionTotals[label]||0)+1;
      }
    });
    // custom actions from all groups
    ACTION_GROUPS.forEach(grp=>{
      try{
        JSON.parse(i.actions["custom_grp_"+grp.num]||"[]").forEach(item=>{
          if(i.actions[item.key])actionTotals[item.label]=(actionTotals[item.label]||0)+1;
        });
      }catch{}
    });
  });

  // treatments — last insp per hive only
  const treatments={};
  lastInspsOnly.forEach(i=>{if(i.treatment&&i.treatment.trim())treatments[i.treatment.trim()]=(treatments[i.treatment.trim()]||0)+1});

  // feedings — last insp per hive only
  const feedings={};
  lastInspsOnly.forEach(i=>{if(i.feeding&&i.feeding.trim())feedings[i.feeding.trim()]=(feedings[i.feeding.trim()]||0)+1});

  // hives with no inspection in 30 days
  const now=new Date();
  const stale=lastPerHive.filter(({insp})=>{
    const d=new Date(insp.date);
    return(now-d)/864e5>30;
  });

  // Build per-action hive list: {label -> [{hive, num}]}
  const actionHives={};
  lastPerHive.forEach(({hive,insp})=>{
    if(!insp.actions||typeof insp.actions!=="object")return;
    ACTIONS.forEach(a=>{
      if(insp.actions[a.key]){
        let label=a.label;
        if(a.hasNum&&insp.actions[a.key+"_val"])label+=" "+insp.actions[a.key+"_val"];
        if(a.hasMerge&&insp.actions[a.key+"_val"])label+=" #"+insp.actions[a.key+"_val"];
        if(a.hasSelect&&insp.actions[a.key+"_sel"])label=insp.actions[a.key+"_sel"];
        if(!actionHives[label])actionHives[label]=[];
        actionHives[label].push(hive);
      }
    });
    ACTION_GROUPS.forEach(grp=>{
      try{const stored=localStorage.getItem("bk_custom_actions");const gc=stored?JSON.parse(stored):{};(gc[grp.num]||[]).forEach(item=>{if(insp.actions[item.key]){if(!actionHives[item.label])actionHives[item.label]=[];actionHives[item.label].push(hive);}});}catch{}
    });
  });

  // Group by location
  const locations=[...new Set(hives.map(h=>h.location||"Χωρίς τοποθεσία"))];
  const totalHives=hives.length;

  const Section=(title,children)=>div({style:{marginBottom:18}},
    div({style:{fontSize:11,fontWeight:700,color:G.textLight,letterSpacing:.5,marginBottom:8,borderBottom:`1px solid ${G.waxDark}`,paddingBottom:4}},title),
    children
  );
  const Row=(label,val,color)=>div({style:{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:`1px solid ${G.waxDark}99`}},
    span({style:{fontSize:13,color:G.text}},label),
    span({style:{fontSize:13,fontWeight:700,color:color||G.amber}},val)
  );
  const ActionRow=(label,hivesArr)=>div({style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"5px 0",borderBottom:`1px solid ${G.waxDark}99`,gap:8}},
    div({style:{flex:1}},
      span({style:{fontSize:12,color:G.text}},label),
      div({style:{display:"flex",flexWrap:"wrap",gap:3,marginTop:2}},
        ...hivesArr.map(hv=>h(HiveSymbols,{key:hv.id,hive:hv,size:18}))
      )
    ),
    span({style:{fontSize:12,fontWeight:700,color:G.amber,flexShrink:0}},hivesArr.length+" από "+totalHives)
  );

  return div({style:{paddingBottom:20}},
    div({style:{fontWeight:800,fontSize:18,marginBottom:16,color:G.amber}},"📋 Σύνοψη"),

    Section("ΣΥΝΟΛΑ",div({},
      Row("Σύνολο επιθεωρήσεων",uniqueDates.length),
      Row("Αυτόν τον μήνα",monthCount),
      Row("Κυψέλες χωρίς επιθεώρηση 30+ ημερών",stale.length,stale.length>0?G.red:G.sage)
    )),

    Object.keys(moods).length>0?Section("ΣΥΜΠΕΡΙΦΟΡΑ",div({},
      Object.entries(moods).sort((a,b)=>b[1]-a[1]).map(([m,n])=>Row(m,n))
    )):null,

    // Actions per location
    locations.map(loc=>{
      const locHives=hives.filter(h=>(h.location||"Χωρίς τοποθεσία")===loc);
      const locActions=Object.entries(actionHives)
        .map(([label,hArr])=>({label,hArr:hArr.filter(h=>(h.location||"Χωρίς τοποθεσία")===loc)}))
        .filter(x=>x.hArr.length>0)
        .sort((a,b)=>b.hArr.length-a.hArr.length);
      if(!locActions.length)return null;
      return Section(loc.toUpperCase(),div({},
        ...locActions.map(({label,hArr})=>ActionRow(label,hArr))
      ));
    }),

    stale.length>0?Section("ΕΚΚΡΕΜΕΙΣ ΕΠΙΘΕΩΡΗΣΕΙΣ (30+ ημέρες)",div({},
      stale.map(({hive,insp},i)=>div({key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:`1px solid ${G.waxDark}`}},
        div({style:{display:"flex",alignItems:"center",gap:8}},
          h(HiveSymbols,{hive,size:22}),
          hive.location?span({style:{fontSize:11,color:G.textLight}},hive.location):null
        ),
        span({style:{fontSize:12,color:G.red}},fmt(insp.date))
      ))
    )):null
  )
}

// InspLogPanel — chronological inspection log with per-day notes
function InspLogPanel({hives,insps,onClose,asView,onSaveNote,fbSaveMisc,fbWatchMisc}){
  // Group inspections by date (unique dates)
  const byDate={};
  insps.forEach(insp=>{
    if(!insp.date)return;
    if(!byDate[insp.date])byDate[insp.date]=[];
    byDate[insp.date].push(insp);
  });
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));

  const [notes,setNotes]=useState(()=>{
    try{const v=localStorage.getItem("bk_insp_notes");return v?JSON.parse(v):{}}catch{return{}}
  });
  const [editing,setEditing]=useState(null); // date string
  const saveNote=(date,txt)=>{
    const next=Object.assign({},notes,{[date]:txt});
    setNotes(next);
    try{localStorage.setItem("bk_insp_notes",JSON.stringify(next))}catch{}
    setEditing(null);
  };

  return div({style:asView?{padding:"0 0 20px",background:G.wax,minHeight:"100%"}:{position:"fixed",inset:0,zIndex:500,background:"#0006",display:"flex",alignItems:"flex-end",justifyContent:"center"}},
    div({style:asView?{padding:"8px 4px"}:{background:G.white,borderRadius:"20px 20px 0 0",padding:"20px 20px 40px",width:"100%",maxWidth:720,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 -8px 32px #0004"}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        div({style:{fontWeight:900,fontSize:18,color:G.amber}},"📅 Επιθεωρήσεις"),
        asView?null:btn({onClick:onClose,style:{background:G.waxDark,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:14,color:G.bark}},"✕")
      ),
      dates.length===0?div({style:{textAlign:"center",padding:30,color:G.textLight}},"Δεν υπάρχουν επιθεωρήσεις"):null,
      ...dates.map(date=>{
        const dayInsps=byDate[date];

// QueenPanel — queen statistics modal
function QueenPanel({hives,insps,onClose,asView}){
  const [sortBy,setSortBy]=useState("age"); // age | number | color | status
  // get last inspection per hive
  const lastInsps=hives.map(h=>{
    const l=insps.filter(i=>i.hiveId===h.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
    return{hive:h,insp:l};
  }).filter(x=>x.insp);

  // by location
  const byLoc={};
  lastInsps.forEach(({hive})=>{
    const loc=hive.location||"Χωρίς τοποθεσία";
    const flrs=(hive.levels||[]).filter(l=>l.type==="floor"||l.isFloor);
    byLoc[loc]=(byLoc[loc]||0)+(flrs.length>1?flrs.length:1);
  });

  // build rows with qa — multi-floor hives expand into per-floor rows
  const rows=[];
  lastInsps.forEach(({hive,insp})=>{
    const hivFlrs=(hive.levels||[]).filter(l=>l.type==="floor"||l.isFloor);
    if(hivFlrs.length>1&&insp.floorData&&insp.floorData.length>0){
      insp.floorData.forEach((fd,fi)=>{
        const flv=hivFlrs[fi];
        const qa=fd.queenBirthdate?qAge(fd.queenBirthdate,insp.date):null;
        rows.push({
          hive,insp,qa,
          isFloorRow:true,floorIdx:fi,floorLevel:flv,
          queenStatus:fd.queenStatus,
          queenMarkColor:fd.queenMarkColor,
          queenNotes:fd.queenNotes,
        });
      });
    } else {
      const qa=insp.queenAge?qAge(insp.queenAge,insp.date):null;
      rows.push({hive,insp,qa});
    }
  });

  // sort
  const statusOrder={"✅ Παρούσα":0,"❓ Αβέβαιη":1,"❌ Απούσα":2};
  const sorted=[...rows].sort((a,b)=>{
    if(sortBy==="age"){
      const am=a.qa?(a.qa.y*12+a.qa.m):-1,bm=b.qa?(b.qa.y*12+b.qa.m):-1;
      return bm-am;
    }
    if(sortBy==="number") return(+(a.floorLevel?a.floorLevel.symbolNumber:a.hive.symbolNumber)||0)-(+(b.floorLevel?b.floorLevel.symbolNumber:b.hive.symbolNumber)||0);
    if(sortBy==="color"){
      const ac=a.insp.queenMarkColor?0:1,bc=b.insp.queenMarkColor?0:1;
      return ac-bc||colorName(a.insp.queenMarkColor||"").localeCompare(colorName(b.insp.queenMarkColor||""));
    }
    if(sortBy==="status"){
      // Notes first, then ✅ → ❓ → ❌
      const an=(a.queenNotes||a.insp.queenNotes||'').trim()?0:1;
      const bn=(b.queenNotes||b.insp.queenNotes||'').trim()?0:1;
      if(an!==bn)return an-bn;
      const ao=statusOrder[a.queenStatus||a.insp.queenStatus]??3,bo=statusOrder[b.queenStatus||b.insp.queenStatus]??3;
      return ao-bo;
    }
    return 0;
  });

  const SortBtn=(label,key,extra)=>btn({onClick:()=>setSortBy(key),style:{
    padding:"4px 10px",borderRadius:14,border:"none",cursor:"pointer",
    fontFamily:"Georgia,serif",fontSize:11,fontWeight:700,
    background:sortBy===key?G.honey:G.waxDark,
    color:sortBy===key?G.beeBlack:G.textLight,
    transition:"all .12s",...(extra||{})

  const Section=(title,children)=>div({style:{marginBottom:16}},
    div({style:{fontSize:11,fontWeight:700,color:G.textLight,letterSpacing:.5,marginBottom:6}},title),
    children
  );
  const Row=(left,right,color)=>div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0",borderBottom:`1px solid ${G.waxDark}`}},
    span({style:{fontSize:13,color:color||G.text}},left),
    span({style:{fontSize:13,fontWeight:700,color:color||G.amber}},right)
  );

  return div({style:asView?{padding:"0 0 20px",background:G.wax,minHeight:"100%"}:{position:"fixed",inset:0,zIndex:500,background:"#0006",display:"flex",alignItems:"flex-end",justifyContent:"center"}},
    div({style:asView?{padding:"8px 4px"}:{background:G.white,borderRadius:"20px 20px 0 0",padding:"20px 20px 40px",width:"100%",maxWidth:720,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 -8px 32px #0004"}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
        div({style:{fontWeight:900,fontSize:18,color:G.amber}},"👑 Βασίλισσες"),
        asView?null:btn({onClick:onClose,style:{background:G.waxDark,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:14,color:G.bark}},"✕")
      ),
      lastInsps.length===0?div({style:{textAlign:"center",padding:30,color:G.textLight}},"Δεν υπάρχουν δεδομένα βασίλισσας"):null,
      lastInsps.length>0?div({style:{marginBottom:16}},
        div({style:{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",marginBottom:10}},
          div({style:{fontWeight:800,fontSize:14,color:G.amber}},"ΣΥΝΟΨΗ ΒΑΣΙΛΙΣΣΩΝ"),
          div({style:{display:"flex",gap:8,alignItems:"center"}},
            ...["✅ Παρούσα","❓ Αβέβαιη","❌ Απούσα"].map(s=>{
              const n=sorted.filter(r=>(r.queenStatus||r.insp.queenStatus)===s).length;
              return n>0?span({key:s,style:{
                fontSize:12,fontWeight:700,
                color:s.includes("Απούσα")?G.red:s.includes("Αβέβαιη")?G.amber:G.sage,
                display:"flex",alignItems:"center",gap:3,
              }},s.split(" ")[0]," ",n):null;
            })
          )
        ),
        // Sort bar
        div({style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}},
          SortBtn("Αριθμός","number"),
          SortBtn("Ηλικία","age"),
          SortBtn("Χρώμα","color"),
          SortBtn("Παρατηρήσεις","status")
        ),
        // Table
        div({},sorted.map((row,i)=>{
          const{hive,insp,qa,isFloorRow,floorLevel}=row;
          const qs=row.queenStatus||insp.queenStatus;
          const qmc=row.queenMarkColor||insp.queenMarkColor;
          const qn=row.queenNotes||insp.queenNotes;
          // For floor rows: show floor's symbol + tiny sibling symbols
          const hivFlrsQ=(hive.levels||[]).filter(l=>l.type==="floor"||l.isFloor);
          const symEl=isFloorRow&&floorLevel&&floorLevel.symbolShape&&floorLevel.symbolColor
            ?div({style:{display:"flex",flexDirection:"column",alignItems:"center",gap:2}},
                h(HiveSymbol,{shape:floorLevel.symbolShape,color:floorLevel.symbolColor,number:floorLevel.symbolNumber||"",size:22}),
                // Sibling floor symbols (other floors in same hive)
                div({style:{display:"flex",gap:1}},
                  ...hivFlrsQ.filter((_,fi)=>hivFlrsQ[fi]!==floorLevel).map((sib,si)=>

          return div({key:i,style:{

            div({style:{minWidth:36}},symEl),
            div({style:{minWidth:52}},
              qa?span({style:{fontSize:12,fontWeight:700,color:G.amber}},qa.disp):span({style:{fontSize:11,color:G.textLight}},"—")

            div({style:{minWidth:20,display:"flex",alignItems:"center",paddingTop:2}},

      Object.keys(byLoc).length>0?Section("ΑΝΑ ΤΟΠΟΘΕΣΙΑ",

// SwipeCard — swipe left to reveal delete, tap delete to confirm via modal
function SwipeCard({onDelete,onEdit,children}){
  const [tx,setTx]=useState(0);
  const startX=React.useRef(null);
  const isDragging=React.useRef(false);
  const didMove=React.useRef(false);
  const THRESHOLD=70;

  function pointerDownNew(e){
    startX.current=e.touches?e.touches[0].clientX:e.clientX;
    isDragging.current=true;
    didMove.current=false;
  }
  function pointerMoveNew(e){
    if(!isDragging.current||startX.current===null)return;
    const x=e.touches?e.touches[0].clientX:e.clientX;
    const dx=x-startX.current;
    if(Math.abs(dx)>4){didMove.current=true;e.stopPropagation();}
    if(dx<0) setTx(Math.max(dx,-110));
    else setTx(Math.min(dx,100));
  }
  function pointerUpNew(){
    isDragging.current=false;
    setTx(prev=>{
      if(prev<=-THRESHOLD)return -100;
      if(prev>=70){if(didMove.current)setTimeout(()=>onEdit(),0);return 0;}
      return 0;
    });
  }

  return div({style:{position:"relative",borderRadius:14,overflow:"hidden"}},
    // Delete panel (right, revealed on swipe left)
    btn({onClick:e=>{e.stopPropagation();setTx(0);onDelete();},style:{
      position:"absolute",top:0,right:0,bottom:0,width:100,
      background:G.red,border:"none",cursor:"pointer",
      display:"flex",alignItems:"center",justifyContent:"center",
      flexDirection:"column",gap:4,borderRadius:14,
    }},div({style:{color:"#fff",fontSize:20}},"🗑"),div({style:{color:"#fff",fontSize:10,fontWeight:700}},"Διαγραφή")),
    // Edit panel (left, revealed on swipe right)
    btn({onClick:e=>{e.stopPropagation();setTx(0);onEdit();},style:{
      position:"absolute",top:0,left:0,bottom:0,width:90,
      background:G.amber,border:"none",cursor:"pointer",
      display:"flex",alignItems:"center",justifyContent:"center",
      flexDirection:"column",gap:4,borderRadius:14,
    }},div({style:{color:"#fff",fontSize:20}},"✏️"),div({style:{color:"#fff",fontSize:10,fontWeight:700}},"Επεξ.")),
    // Draggable card
    div({
      onTouchStart:pointerDownNew,onTouchMove:pointerMoveNew,onTouchEnd:pointerUpNew,
      onMouseDown:pointerDownNew,onMouseMove:pointerMoveNew,onMouseUp:pointerUpNew,onMouseLeave:pointerUpNew,
      style:{
        transform:`translateX(${tx}px)`,
        transition:isDragging.current?"none":"transform .22s ease",
        background:G.white,borderRadius:0,
        border:"none",borderBottom:"1px solid "+G.waxDark+"44",
        boxShadow:"none",
        padding:"3px 4px",
        position:"relative",zIndex:1,
        touchAction:"pan-y",
        userSelect:"none",
      }
    },children)
  )
}

                    ?h(QueenInfo,{fqa:qa,qs:insp.queenStatus,qmc:insp.queenMarkColor,qpos:insp.queenPosition})
                    :null
                ):null,
                // Tower
                hive?div({style:{flexShrink:0}},h(HiveTower,{hive,size:32,hideSymbols:true,hasQueenExcl:!!(insp.actions&&insp.actions.queenExcl),hasPropolisSieve:!!(insp.actions&&insp.actions.propolis)})):null,
                // Brood/honey
                h(BroodHoneyGrid,{hive,levelData:insp.levelData&&insp.levelData.length>0?insp.levelData:null,size:32}),
                // Info column
                div({style:{flex:1,minWidth:0,display:"flex",flexDirection:"column",gap:2,justifyContent:"center",paddingRight:22}},
                  infoItems.length>0?div({style:{display:"flex",flexWrap:"wrap",gap:"4px",alignItems:"center",justifyContent:"center",alignContent:"center"}},
                    ...infoItems.map(renderInfoItem)
                  ):null
                ),
                // Date vertical
                div({style:{writingMode:"vertical-rl",fontSize:9,color:G.textLight,flexShrink:0,alignSelf:"stretch",display:"flex",alignItems:"center",letterSpacing:1,opacity:.7,borderLeft:"1px solid "+G.waxDark,paddingLeft:4}},fmt(insp.date))
              ),
              // Notes bottom
              hasNotes?div({style:{position:"absolute",bottom:0,left:0,right:0,fontSize:9,color:G.textLight,fontStyle:"italic",padding:"1px 4px",borderTop:"1px solid "+G.waxDark+"22",background:G.white,lineHeight:1.4}},
                "\u270E "+insp.notes
              ):null
            )
          );
        })
      )
    ))
  );
}

function HiveHistory({hive,insps,hives,onEdit,onDelete,onNewInsp}){
  const hiveInsps=insps.filter(i=>i.hiveId===hive.id).sort((a,b)=>b.date.localeCompare(a.date));
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");

  // last 10 for summary chart
  const last10=hiveInsps.slice(0,10);

  function totalBrood(insp){
    if(insp.levelData&&insp.levelData.length>0)return insp.levelData.reduce((s,l)=>s+(+l.brood||0),0);
    return +insp.brood||0;
  }
  function totalHoney(insp){
    if(insp.levelData&&insp.levelData.length>0)return insp.levelData.reduce((s,l)=>s+(+l.honey||0),0);
    return +insp.honey||0;
  }

  // date filter totals
  const filtered=hiveInsps.filter(i=>{
    if(dateFrom&&i.date<dateFrom)return false;
    if(dateTo&&i.date>dateTo)return false;
    return true;
  });
  const filtTotalBrood=filtered.reduce((s,i)=>s+totalBrood(i),0);
  const filtTotalHoney=filtered.reduce((s,i)=>s+totalHoney(i),0);
  const hasFilter=dateFrom||dateTo;

  const [showSummary,setShowSummary]=useState(false);

  return div({},
    // Summary button
    last10.length>0?div({style:{marginBottom:12}},
      btn({
        onTouchEnd:e=>{e.preventDefault();setShowSummary(true);},
        onClick:e=>{if(e.pointerType!=="touch")setShowSummary(true);},
        style:{
          padding:"8px 16px",borderRadius:10,border:`1.5px solid ${G.waxDark}`,
          background:G.white,cursor:"pointer",fontFamily:"Georgia,serif",
          fontWeight:700,fontSize:13,color:G.amber,
          display:"flex",alignItems:"center",gap:8,
        }
      },"🥚🍯 Σύνοψη Γόνου & Μελιών"),
      // Popup modal
      showSummary?div({style:{position:"fixed",inset:0,zIndex:500,background:"#0006",display:"flex",alignItems:"flex-end",justifyContent:"center"},onClick:()=>setShowSummary(false)},
        div({style:{background:G.white,borderRadius:"20px 20px 0 0",padding:"20px 20px 32px",width:"100%",maxWidth:720,maxHeight:"80vh",overflowY:"auto",boxShadow:"0 -8px 32px #0004"},onClick:e=>e.stopPropagation()},
          div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}},
            div({style:{fontWeight:900,fontSize:16,color:G.amber}},"🥚🍯 Σύνοψη Γόνου & Μελιών"),
            btn({onClick:()=>setShowSummary(false),style:{background:G.waxDark,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:14,color:G.bark}},"✕")
          ),
          div({style:{fontSize:12,color:G.textLight,marginBottom:10}},"Τελευταίες "+(last10.length>=10?"10":last10.length)+" επιθεωρήσεις"),
          // Date filter inside popup
          div({style:{display:"flex",gap:6,alignItems:"center",marginBottom:14,flexWrap:"wrap"}},
            span({style:{fontSize:11,fontWeight:700,color:G.textLight}},"📅 Εύρος:"),
            h("input",{type:"date",value:dateFrom,onChange:e=>setDateFrom(e.target.value),style:{
              padding:"4px 8px",borderRadius:7,border:`1px solid ${G.waxDark}`,
              background:G.wax,fontSize:12,color:G.text,fontFamily:"Georgia,serif",outline:"none",flex:1,minWidth:100
            }}),
            span({style:{fontSize:11,color:G.textLight}},"—"),
            h("input",{type:"date",value:dateTo,onChange:e=>setDateTo(e.target.value),style:{
              padding:"4px 8px",borderRadius:7,border:`1px solid ${G.waxDark}`,
              background:G.wax,fontSize:12,color:G.text,fontFamily:"Georgia,serif",outline:"none",flex:1,minWidth:100
            }}),
            hasFilter?btn({onClick:()=>{setDateFrom("");setDateTo("");},style:{background:"none",border:"none",cursor:"pointer",fontSize:13,color:G.textLight,padding:"0 2px"}},"✕"):null
          ),
          // If filter active show filtered results, else show last10
          hasFilter?div({},

            div({style:{display:"grid",gridTemplateColumns:"auto 70px 70px",gap:"4px 8px",alignItems:"center"}},
              div({}),
              div({style:{fontSize:11,fontWeight:700,color:G.bark,textAlign:"center"}},"🥚 Γόνος"),
              div({style:{fontSize:11,fontWeight:700,color:G.amber,textAlign:"center"}},"🍯 Μέλι"),
              ...filtered.map((insp,i)=>{
                const prev=filtered[i+1];
                const tb=totalBrood(insp),th=totalHoney(insp);
                const pb=prev?totalBrood(prev):null,ph=prev?totalHoney(prev):null;
                const diffB=pb!==null?tb-pb:null,diffH=ph!==null?th-ph:null;
                const broodApprox=insp.levelData&&insp.levelData.some(l=>l.broodApprox===true);
                const honeyApprox=insp.levelData&&insp.levelData.some(l=>l.honeyApprox===true);
                const NumCell=(val,diff,col,unchecked,approx)=>div({style:{display:"flex",alignItems:"center",width:70}},

                  div({style:{flex:1,fontSize:9,fontWeight:700,paddingLeft:3,color:diff&&diff!==0?(diff>0?G.green:G.red):"transparent",whiteSpace:"nowrap",overflow:"hidden"}},diff&&diff!==0?(diff>0?"(+"+diff+")":`(${diff})`):"")
                );
                return[
                  span({key:"d"+i,style:{fontSize:10,color:G.textLight,whiteSpace:"nowrap"}},fmt(insp.date)),
                  (console.log("BROOD_U",insp.date,insp.levelData&&insp.levelData.map(l=>l.broodUnchecked)),NumCell(tb,diffB,G.bark,insp.levelData&&insp.levelData.some(l=>l.broodUnchecked===true),broodApprox)),
                  NumCell(th,diffH,G.amber,insp.levelData&&insp.levelData.some(l=>l.honeyUnchecked===true),honeyApprox),
                ];
              })
            )
          ):null,
      div({style:{display:"grid",gridTemplateColumns:"auto 70px 70px 46px 46px",gap:"4px 6px",alignItems:"center"}},
        div({}),
        div({style:{fontSize:11,fontWeight:700,color:G.bark,textAlign:"center"}},"\ud83e\udd5a \u0393\u03cc\u03bd\u03bf\u03c2"),
        div({style:{fontSize:11,fontWeight:700,color:G.amber,textAlign:"center"}},"\ud83c\udf6f \u039c\u03ad\u03bb\u03b9"),
        div({style:{fontSize:9,fontWeight:700,color:G.bark,textAlign:"center"}},"\u21c4\ud83e\udd5a"),
        div({style:{fontSize:9,fontWeight:700,color:G.amber,textAlign:"center"}},"\u21c4\ud83c\udf6f"),
        ...last10.map((insp,i)=>{
          const prev=last10[i+1];
          const tb=totalBrood(insp),th=totalHoney(insp);
          const pb=prev?totalBrood(prev):null,ph=prev?totalHoney(prev):null;
          const diffB=pb!==null?tb-pb:null,diffH=ph!==null?th-ph:null;
          const broodApprox=insp.levelData&&insp.levelData.some(l=>l.broodApprox===true);
          const honeyApprox=insp.levelData&&insp.levelData.some(l=>l.honeyApprox===true);
          const rB=insp.actions&&insp.actions.rebalance&&(insp.actions.rebalance_brood_n||0)>0?((insp.actions.rebalance_brood_dir||"+")+insp.actions.rebalance_brood_n):null;
          const rH=insp.actions&&insp.actions.rebalance&&(insp.actions.rebalance_honey_n||0)>0?((insp.actions.rebalance_honey_dir||"+")+insp.actions.rebalance_honey_n):null;
          const NumCell=(val,diff,col,unc,approx)=>div({style:{display:"flex",alignItems:"center",width:70}},
            div({style:{width:28,textAlign:"right",flexShrink:0,fontSize:14,fontWeight:900,color:col,fontStyle:approx?"italic":"normal",textDecoration:unc===true?"underline":"none"}},approx?"~"+(val||"\u2014"):(val||"\u2014")),
            div({style:{flex:1,fontSize:9,fontWeight:700,paddingLeft:3,color:diff&&diff!==0?(diff>0?G.green:G.red):"transparent",whiteSpace:"nowrap",overflow:"hidden"}},diff&&diff!==0?(diff>0?"(+"+diff+")":"("+diff+")"):"")          );
          return[
            span({key:"d"+i,style:{fontSize:10,color:G.textLight,whiteSpace:"nowrap"}},fmt(insp.date)),
            NumCell(tb,diffB,G.bark,insp.levelData&&insp.levelData.some(l=>l.broodUnchecked===true),broodApprox),
            NumCell(th,diffH,G.amber,insp.levelData&&insp.levelData.some(l=>l.honeyUnchecked===true),honeyApprox),
            span({key:"rb"+i,style:{fontSize:11,fontWeight:700,color:rB&&rB[0]==="-"?G.red:G.green,textAlign:"center",display:"block"}},rB||""),
            span({key:"rh"+i,style:{fontSize:11,fontWeight:700,color:rH&&rH[0]==="-"?G.red:G.green,textAlign:"center",display:"block"}},rH||""),
          ];
        })
      )
        )
      ):null
    ):null,



    // History list
    div({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}},
      div({style:{fontWeight:700,fontSize:15,color:G.textLight}},"Ιστορικό ("+hiveInsps.length+")"),
      onNewInsp?btn({
        onTouchEnd:e=>{e.preventDefault();onNewInsp();},
        onClick:e=>{if(e.pointerType!=="touch")onNewInsp();},
        style:{padding:"5px 12px",borderRadius:8,border:"none",
          background:G.honey,cursor:"pointer",fontFamily:"Georgia,serif",
          fontWeight:700,fontSize:13,color:G.beeBlack,
          WebkitTapHighlightColor:"transparent"}
      },"+ Επιθεώρηση"):null
    ),
    h(InspList,{insps,hiveId:hive.id,hives,onEdit,onDelete})
  )
}

// HarvestPanel — Τρύγος
function HarvestPanel({hives,asView,fbSaveMisc,fbWatchMisc}){
  const [harvests,setHarvests]=useState(()=>{try{const v=localStorage.getItem("bk_harvests");return v?JSON.parse(v):[]}catch{return[]}});
  const [form,setForm]=useState(null);
  useEffect(()=>{
    if(!fbWatchMisc)return;
    return fbWatchMisc("harvests",data=>{setHarvests(data);});
  },[fbWatchMisc]); // null or {id,date,entries:{hiveId:frames}}
  const [confirmDel,setConfirmDel]=useState(null);
  const [expandedId,setExpandedId]=useState(null);

  const saveAll=next=>{setHarvests(next);try{localStorage.setItem("bk_harvests",JSON.stringify(next))}catch{}if(fbSaveMisc)fbSaveMisc("harvests",next);};

  const openNew=()=>{
    const entries={};
    (hives||[]).forEach(h=>entries[h.id]="");
    setForm({id:null,date:today(),entries,notes:""});
  };

  const saveForm=()=>{
    if(!form.date)return;
    const rec={id:form.id||Date.now()+"",date:form.date,entries:Object.fromEntries(Object.entries(form.entries).filter(([,v])=>v!==""&&+v>0)),notes:form.notes||""};
    const next=form.id?harvests.map(h=>h.id===form.id?rec:h):[rec,...harvests];
    saveAll(next.sort((a,b)=>b.date.localeCompare(a.date)));
    setForm(null);
  };

  const del=id=>saveAll(harvests.filter(h=>h.id!==id));

  // Group hives by location
  const locGroups=()=>{
    const map={};
    (hives||[]).forEach(hv=>{const loc=hv.location&&hv.location.trim()||"—";if(!map[loc])map[loc]=[];map[loc].push(hv);});
    return map;
  };

  const totalForHarvest=h=>Object.values(h.entries||{}).reduce((s,v)=>s+(+v||0),0);
  const totalForLoc=(h,loc)=>{
    const ids=(hives||[]).filter(hv=>(hv.location&&hv.location.trim()||"—")===loc).map(hv=>hv.id);
    return ids.reduce((s,id)=>s+(+h.entries[id]||0),0);
  };

  return div({style:{padding:"8px 4px 80px",background:G.wax,minHeight:"100%"}},
    div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      div({style:{fontWeight:900,fontSize:18,color:G.amber}},"🍯 Τρύγος"),
      btn({
        onTouchEnd:e=>{e.preventDefault();openNew();},
        onClick:e=>{if(e.pointerType!=="touch")openNew();},
        style:{padding:"8px 14px",borderRadius:10,border:"none",background:G.honey,cursor:"pointer",fontWeight:700,fontSize:13,color:G.beeBlack,fontFamily:"Georgia,serif",WebkitTapHighlightColor:"transparent"}
      },"+ Νέος Τρύγος")
    ),

    // List of harvests
    harvests.length===0?div({style:{textAlign:"center",padding:"40px 0",color:G.textLight,fontSize:13}},"Δεν υπάρχουν τρύγοι ακόμα"):null,
    div({style:{display:"flex",flexDirection:"column",gap:8}},
      ...harvests.map(harv=>{
        const groups=locGroups();
        const isOpen=expandedId===harv.id;
        const total=totalForHarvest(harv);
        return h(SwipeCard,{key:harv.id,
          onEdit:()=>{const entries={};(hives||[]).forEach(hv=>entries[hv.id]=harv.entries[hv.id]||"");setForm({id:harv.id,date:harv.date,entries,notes:harv.notes||""});},
          onDelete:()=>setConfirmDel(harv.id)},
          div({style:{background:G.white,borderRadius:0,border:"none",borderBottom:"1px solid "+G.waxDark+"44",overflow:"hidden"}},
          // Header
          div({style:{display:"flex",alignItems:"center",gap:8,padding:"10px 12px",cursor:"pointer"},
            onClick:()=>setExpandedId(isOpen?null:harv.id)},
            div({style:{flex:1}},
              div({style:{fontWeight:700,fontSize:15,color:G.amber}},harv.date.split("-").reverse().join("/")),
              div({style:{fontSize:12,color:G.textLight}},total+" πλαίσια συνολικά · "+Object.keys(harv.entries||{}).length+" / "+(hives||[]).length+" κυψέλες")
            ),
            span({style:{fontSize:12,color:G.textLight}},isOpen?"▾":"▸")
          ),
          // Expanded details
          isOpen?div({style:{borderTop:"1px solid "+G.waxDark+"44",padding:"10px 12px"}},
            ...Object.entries(groups).map(([loc,locHives])=>{
              const locTotal=totalForLoc(harv,loc);
              const locEntries=locHives.filter(hv=>harv.entries[hv.id]&&+harv.entries[hv.id]>0);
              if(locEntries.length===0)return null;
              return div({key:loc,style:{marginBottom:10}},
                div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}},
                  span({style:{fontSize:11,fontWeight:700,color:G.amber}},"📍 "+loc),
                  span({style:{fontSize:11,fontWeight:700,color:G.bark}},locTotal+" πλαίσια")
                ),
                div({style:{display:"flex",flexWrap:"wrap",gap:6}},
                  ...locEntries.map(hv=>
                    div({key:hv.id,style:{display:"flex",alignItems:"center",gap:4,background:G.wax,borderRadius:8,padding:"3px 8px"}},
                      h(HiveSymbols,{hive:hv,size:18}),
                      span({style:{fontSize:13,fontWeight:700,color:G.bark}},harv.entries[hv.id]),
                      span({style:{fontSize:10,color:G.textLight}},"πλ.")
                    )
                  )
                )
              );
            }).filter(Boolean),
            div({style:{marginTop:8,paddingTop:8,borderTop:"1px solid "+G.waxDark+"44",display:"flex",justifyContent:"flex-end"}},
              span({style:{fontSize:14,fontWeight:900,color:G.amber}},"Σύνολο: "+total+" πλαίσια")
            ),
            harv.notes&&harv.notes.trim()?div({style:{
              marginTop:6,fontSize:12,color:G.textLight,fontStyle:"italic",
              borderLeft:"2px solid "+G.honey+"66",paddingLeft:8,lineHeight:1.5
            }},"\u270E "+harv.notes):null
          ):null
          )
        );
      })
    ),

    // Form modal
    form?div({style:{position:"fixed",inset:0,zIndex:700,background:"#0007",display:"flex",alignItems:"flex-end",justifyContent:"center"},onClick:()=>setForm(null)},
      div({style:{background:G.white,borderRadius:"20px 20px 0 0",padding:"20px",width:"100%",maxWidth:720,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 -8px 32px #0004"},onClick:e=>e.stopPropagation()},
        div({style:{fontWeight:800,fontSize:16,color:G.amber,marginBottom:14}},form.id?"✏️ Επεξεργασία Τρύγου":"🍯 Νέος Τρύγος"),
        // Date
        div({style:{marginBottom:14}},
          div({style:{fontSize:11,fontWeight:700,color:G.textLight,marginBottom:4}},"Ημερομηνία Τρύγου"),
          inp({type:"date",value:form.date,onChange:e=>setForm(p=>({...p,date:e.target.value})),
            style:{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid "+G.waxDark,background:G.wax,fontSize:13,fontFamily:"Georgia,serif"}})
        ),
        // Per location/hive entries
        ...Object.entries(locGroups()).map(([loc,locHives])=>
          div({key:loc,style:{marginBottom:14}},
            div({style:{fontSize:12,fontWeight:700,color:G.amber,marginBottom:6,padding:"4px 0",borderBottom:"1px solid "+G.honey+"44"}},"📍 "+loc),
            div({style:{display:"flex",flexDirection:"column",gap:6}},
              ...locHives.map(hv=>
                div({key:hv.id,style:{display:"flex",alignItems:"center",gap:8}},
                  h(HiveSymbols,{hive:hv,size:20}),
                  span({style:{fontSize:12,color:G.textLight,flex:1}},hv.description||hv.name||""),
                  div({style:{display:"flex",alignItems:"center",gap:6}},
                    btn({
                      onTouchEnd:e=>{e.preventDefault();setForm(p=>({...p,entries:{...p.entries,[hv.id]:String(Math.max(0,(+p.entries[hv.id]||0)-1))}}));},
                      onClick:e=>{if(e.pointerType!=="touch")setForm(p=>({...p,entries:{...p.entries,[hv.id]:String(Math.max(0,(+p.entries[hv.id]||0)-1))}}));},
                      style:{width:28,height:28,borderRadius:6,border:"1px solid "+G.waxDark,background:G.wax,cursor:"pointer",fontSize:16,fontWeight:700,color:G.bark,display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"}
                    },"-"),
                    inp({type:"number",min:"0",value:form.entries[hv.id]||"",
                      onChange:e=>setForm(p=>({...p,entries:{...p.entries,[hv.id]:e.target.value}})),
                      placeholder:"0",
                      style:{width:50,textAlign:"center",padding:"4px",borderRadius:6,border:"1px solid "+G.waxDark,background:G.wax,fontSize:14,fontWeight:700,fontFamily:"Georgia,serif"}}),
                    btn({
                      onTouchEnd:e=>{e.preventDefault();setForm(p=>({...p,entries:{...p.entries,[hv.id]:String((+p.entries[hv.id]||0)+1)}}));},
                      onClick:e=>{if(e.pointerType!=="touch")setForm(p=>({...p,entries:{...p.entries,[hv.id]:String((+p.entries[hv.id]||0)+1)}}));},
                      style:{width:28,height:28,borderRadius:6,border:"1px solid "+G.waxDark,background:G.wax,cursor:"pointer",fontSize:16,fontWeight:700,color:G.bark,display:"flex",alignItems:"center",justifyContent:"center",WebkitTapHighlightColor:"transparent"}
                    },"+"),
                    span({style:{fontSize:10,color:G.textLight,width:20}},"πλ.")
                  )
                )
              )
            )
          )
        ),
        // Notes
        div({style:{marginBottom:14}},
          div({style:{fontSize:11,fontWeight:700,color:G.textLight,marginBottom:4}},"Σημειώσεις"),
          h("textarea",{value:form.notes||"",onChange:e=>setForm(p=>({...p,notes:e.target.value})),
            rows:3,placeholder:"π.χ. Καλή χρονιά, πρώτος τρύγος...",
            style:{width:"100%",padding:"8px 10px",borderRadius:8,border:"1px solid "+G.waxDark,
              background:G.wax,fontSize:13,fontFamily:"Georgia,serif",resize:"vertical"}})
        ),
        // Total preview
        div({style:{padding:"8px 0",borderTop:"1px solid "+G.waxDark,marginBottom:14,textAlign:"right"}},
          span({style:{fontSize:13,fontWeight:700,color:G.amber}},"Σύνολο: "+Object.values(form.entries).reduce((s,v)=>s+(+v||0),0)+" πλαίσια")
        ),
        div({style:{display:"flex",gap:10}},
          btn({onClick:()=>setForm(null),style:{flex:1,padding:"12px",borderRadius:10,border:"1px solid "+G.waxDark,background:G.white,cursor:"pointer",fontWeight:700,fontSize:14,color:G.textLight,fontFamily:"Georgia,serif"}},"Ακύρωση"),
          btn({
            onTouchEnd:e=>{e.preventDefault();saveForm();},
            onClick:e=>{if(e.pointerType!=="touch")saveForm();},
            style:{flex:2,padding:"12px",borderRadius:10,border:"none",background:G.honey,cursor:"pointer",fontWeight:700,fontSize:14,color:G.beeBlack,fontFamily:"Georgia,serif",WebkitTapHighlightColor:"transparent"}
          },"💾 Αποθήκευση")
        )
      )
    ):null,

    // Confirm delete
    confirmDel?div({style:{position:"fixed",inset:0,zIndex:800,background:"#0007",display:"flex",alignItems:"center",justifyContent:"center"}},
      div({style:{background:G.white,borderRadius:16,padding:"24px",maxWidth:300,width:"90%",textAlign:"center"}},
        div({style:{fontSize:32,marginBottom:8}},"🗑"),
        div({style:{fontWeight:700,fontSize:15,marginBottom:16,color:G.text}},"Διαγραφή τρύγου;"),
        div({style:{display:"flex",gap:10}},
          btn({onClick:()=>setConfirmDel(null),style:{flex:1,padding:"10px",borderRadius:8,border:"1px solid "+G.waxDark,background:G.white,cursor:"pointer",fontWeight:700,color:G.textLight,fontFamily:"Georgia,serif"}},"Άκυρο"),
          btn({onClick:()=>del(confirmDel),style:{flex:1,padding:"10px",borderRadius:8,border:"none",background:G.red,cursor:"pointer",fontWeight:700,color:"#fff",fontFamily:"Georgia,serif"}},"Διαγραφή")
        )
      )
    ):null
  );
}

// FinancePanel
function FinancePanel({onClose,asView,fbSaveMisc,fbWatchMisc}){
  const [tab,setTab]=useState("income");
  const [records,setRecords]=useState(()=>{try{const v=localStorage.getItem("bk_finance");return v?JSON.parse(v):[]}catch{return[]}});
  const [cats,setCats]=useState(()=>{try{const v=localStorage.getItem("bk_finance_cats");return v?JSON.parse(v):{income:[],expense:[]}}catch{return{income:[],expense:[]}}});
  const [form,setForm]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null);
  const [newCat,setNewCat]=useState("");
  const [addingCat,setAddingCat]=useState(false);

  const saveCats=next=>{setCats(next);try{localStorage.setItem("bk_finance_cats",JSON.stringify(next))}catch{}if(fbSaveMisc)fbSaveMisc("finance_cats",next);};
  useEffect(()=>{
    if(!fbWatchMisc)return;
    const u1=fbWatchMisc("finance",data=>{setRecords(data);});
    const u2=fbWatchMisc("finance_cats",data=>{setCats(data);});
    return ()=>{u1&&u1();u2&&u2();};
  },[fbWatchMisc]);
  const addCat=()=>{if(!newCat.trim())return;saveCats({...cats,[tab]:[...cats[tab],newCat.trim()]});setNewCat("");setAddingCat(false);};
  const delCat=c=>saveCats({...cats,[tab]:cats[tab].filter(x=>x!==c)});

  const saveRec=r=>{
    const next=form.id?records.map(x=>x.id===form.id?r:x):[...records,Object.assign({},r,{id:Date.now()+"",type:tab})];
    setRecords(next);try{localStorage.setItem("bk_finance",JSON.stringify(next))}catch{}if(fbSaveMisc)fbSaveMisc("finance",next);
    setForm(null);
  };
  const delRec=id=>{
    const next=records.filter(x=>x.id!==id);
    setRecords(next);try{localStorage.setItem("bk_finance",JSON.stringify(next))}catch{}if(fbSaveMisc)fbSaveMisc("finance",next);
    setConfirmDel(null);
  };

  const totalInc=records.filter(r=>r.type==="income").reduce((s,r)=>s+(+r.amount||0),0);
  const totalExp=records.filter(r=>r.type==="expense").reduce((s,r)=>s+(+r.amount||0),0);
  const balance=totalInc-totalExp;
  const list=records.filter(r=>r.type===tab).sort((a,b)=>b.date.localeCompare(a.date));
  const fmt=n=>n.toFixed(2).replace(".",",")+"\u20ac";

  const catTotals={};
  records.filter(r=>r.type===tab).forEach(r=>{const c=r.category||"-";catTotals[c]=(catTotals[c]||0)+(+r.amount||0);});

  const isInc=tab==="income";
  const accentCol=isInc?"#16a34a":G.red;
  const bgCol=isInc?"#f0fdf4":"#fef2f2";
  const borderCol=isInc?"#86efac":"#fca5a5";

  return div({style:asView?{padding:"0 0 20px",background:G.wax,minHeight:"100%"}:{position:"fixed",inset:0,zIndex:500,background:"#0006",display:"flex",alignItems:"flex-end",justifyContent:"center"}},
    div({style:asView?{padding:"8px 4px"}:{background:G.white,borderRadius:"20px 20px 0 0",padding:"16px 16px 40px",width:"100%",maxWidth:720,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 -8px 32px #0004"}},
      div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        div({style:{fontWeight:900,fontSize:18,color:G.amber}},"\u2696\ufe0f \u0388\u03c3\u03bf\u03b4\u03b1 & \u0388\u03be\u03bf\u03b4\u03b1"),
        asView?null:btn({onClick:onClose,style:{background:G.waxDark,border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontWeight:700,fontSize:14,color:G.bark}},"\u2715")
      ),
      div({style:{display:"flex",gap:8,marginBottom:16}},
        div({style:{flex:1,background:"#f0fdf4",borderRadius:10,padding:"10px 12px",border:"1px solid #86efac"}},
          div({style:{fontSize:10,color:"#16a34a",fontWeight:700}},"\u0395\u03a3\u039f\u0394\u0391"),
          div({style:{fontSize:18,fontWeight:900,color:"#16a34a"}},fmt(totalInc))
        ),
        div({style:{flex:1,background:"#fef2f2",borderRadius:10,padding:"10px 12px",border:"1px solid #fca5a5"}},
          div({style:{fontSize:10,color:G.red,fontWeight:700}},"\u0395\u039e\u039f\u0394\u0391"),
          div({style:{fontSize:18,fontWeight:900,color:G.red}},fmt(totalExp))
        ),
        div({style:{flex:1,background:balance>=0?"#f0fdf4":"#fef2f2",borderRadius:10,padding:"10px 12px",border:"1px solid "+(balance>=0?"#86efac":"#fca5a5")}},
          div({style:{fontSize:10,color:balance>=0?"#16a34a":G.red,fontWeight:700}},"\u0399\u03a3\u039f\u0396\u03a5\u0393\u0399\u039f"),
          div({style:{fontSize:18,fontWeight:900,color:balance>=0?"#16a34a":G.red}},(balance>=0?"+":"")+fmt(Math.abs(balance)))
        )
      ),
      div({style:{display:"flex",gap:6,marginBottom:12}},
        ...[{id:"income",label:"\ud83d\udcb0 \u0388\u03c3\u03bf\u03b4\u03b1"},{id:"expense",label:"\ud83d\udcb8 \u0388\u03be\u03bf\u03b4\u03b1"}].map(t=>
          btn({key:t.id,
            onTouchEnd:e=>{e.preventDefault();setTab(t.id);},
            onClick:e=>{if(e.pointerType!=="touch")setTab(t.id);},
            style:{flex:1,padding:"8px",borderRadius:10,border:"1.5px solid "+(tab===t.id?G.amber:G.waxDark),
              background:tab===t.id?G.honey+"22":G.white,cursor:"pointer",
              fontWeight:700,fontSize:13,color:tab===t.id?G.amber:G.textLight,
              fontFamily:"Georgia,serif",WebkitTapHighlightColor:"transparent"}
          },t.label)
        )
      ),
      Object.keys(catTotals).length>0?div({style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}},
        ...Object.entries(catTotals).map(([c,tot])=>
          div({key:c,style:{padding:"4px 10px",borderRadius:8,background:bgCol,border:"1px solid "+borderCol,fontSize:11}},
            span({style:{fontWeight:700,color:G.textLight}},c+": "),
            span({style:{fontWeight:900,color:accentCol}},fmt(tot))
          )
        )
      ):null,
      div({style:{marginBottom:12}},
        div({style:{fontSize:11,fontWeight:700,color:G.textLight,marginBottom:6}},"\u039a\u0391\u03a4\u0397\u0393\u039f\u03a1\u0399\u0395\u03a3"),
        div({style:{display:"flex",flexWrap:"wrap",gap:6,marginBottom:addingCat?8:0}},
          ...cats[tab].map(c=>
            div({key:c,style:{display:"inline-flex",alignItems:"center",gap:3,padding:"4px 8px",borderRadius:8,background:G.wax,border:"1px solid "+G.waxDark}},
              span({style:{fontSize:12,color:G.text}},c),
              btn({onClick:()=>delCat(c),style:{background:"none",border:"none",cursor:"pointer",fontSize:10,color:G.red,padding:"0 0 0 2px",lineHeight:1}},"\u2715")
            )
          ),
          btn({
            onTouchEnd:e=>{e.preventDefault();setAddingCat(true);},
            onClick:e=>{if(e.pointerType!=="touch")setAddingCat(true);},
            style:{padding:"4px 10px",borderRadius:8,border:"1.5px dashed "+borderCol,
              background:bgCol,cursor:"pointer",fontSize:13,fontWeight:700,color:accentCol,WebkitTapHighlightColor:"transparent"}
          },"+")
        ),
        addingCat?div({style:{display:"flex",gap:6}},
          inp({type:"text",value:newCat,onChange:e=>setNewCat(e.target.value),
            onKeyDown:e=>{if(e.key==="Enter")addCat();if(e.key==="Escape"){setAddingCat(false);setNewCat("");}},
            placeholder:"\u039d\u03ad\u03b1 \u03ba\u03b1\u03c4\u03b7\u03b3\u03bf\u03c1\u03af\u03b1...",autoFocus:true,
            style:{flex:1,padding:"6px 10px",borderRadius:8,border:"1px solid "+G.amber,background:G.wax,fontSize:13,fontFamily:"Georgia,serif"}}),
          btn({onClick:addCat,style:{padding:"6px 12px",borderRadius:8,border:"none",background:G.honey,cursor:"pointer",fontWeight:700,fontSize:13,color:G.beeBlack,fontFamily:"Georgia,serif"}},"\u2713"),
          btn({onClick:()=>{setAddingCat(false);setNewCat("");},style:{padding:"6px 10px",borderRadius:8,border:"1px solid "+G.waxDark,background:G.white,cursor:"pointer",fontSize:13,color:G.textLight}},"\u2715")
        ):null
      ),
      btn({
        onTouchEnd:e=>{e.preventDefault();setForm({type:tab,date:today(),amount:"",category:cats[tab][0]||"",desc:"",id:null});},
        onClick:e=>{if(e.pointerType!=="touch")setForm({type:tab,date:today(),amount:"",category:cats[tab][0]||"",desc:"",id:null});},
        style:{width:"100%",padding:"10px",borderRadius:10,border:"none",marginBottom:12,
          background:G.honey,cursor:"pointer",fontWeight:700,fontSize:14,color:G.beeBlack,
          fontFamily:"Georgia,serif",WebkitTapHighlightColor:"transparent"}
      },"+ \u039d\u03ad\u03b1 \u0395\u03b3\u03b3\u03c1\u03b1\u03c6\u03ae"),
      list.length===0?div({style:{textAlign:"center",padding:"32px 0",color:G.textLight,fontSize:13}},"\u0394\u03b5\u03bd \u03c5\u03c0\u03ac\u03c1\u03c7\u03bf\u03c5\u03bd \u03b5\u03b3\u03b3\u03c1\u03b1\u03c6\u03ad\u03c2"):null,
      div({style:{display:"flex",flexDirection:"column",gap:6}},
        ...list.map(r=>div({key:r.id,style:{background:G.wax,borderRadius:10,padding:"10px 12px",border:"1px solid "+G.waxDark,display:"flex",alignItems:"center",gap:8}},
          div({style:{flex:1}},
            div({style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              span({style:{fontSize:14,fontWeight:900,color:r.type==="income"?"#16a34a":G.red}},fmt(+r.amount||0)),
              span({style:{fontSize:11,color:G.textLight}},r.date?r.date.split("-").reverse().join("/"):"")
            ),
            r.category?div({style:{fontSize:11,fontWeight:700,color:G.amber,marginTop:2}},r.category):null,
            r.desc&&r.desc.trim()?div({style:{fontSize:11,color:G.textLight,fontStyle:"italic",marginTop:2}},"\u270e "+r.desc):null
          ),
          div({style:{display:"flex",gap:4}},
            btn({onClick:()=>setForm({...r}),style:{background:G.waxDark,border:"none",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:12,color:G.bark}},"\u270f\ufe0f"),
            btn({onClick:()=>setConfirmDel(r.id),style:{background:"#fef2f2",border:"none",borderRadius:7,padding:"5px 8px",cursor:"pointer",fontSize:12,color:G.red}},"\ud83d\uddd1")
          )
        ))
      ),
      form?div({style:{position:"fixed",inset:0,zIndex:700,background:"#0007",display:"flex",alignItems:"flex-end",justifyContent:"center"},onClick:()=>setForm(null)},

function GroupScreen({user,onGroup}){
  const [mode,setMode]=useState("choice"); // choice | create | join

  const [inviteCode,setInviteCode]=useState("");
  const [err,setErr]=useState("");

  const createGroup=async()=>{
    if(!groupName.trim())return;
    setLoading(true); setErr("");
    let tries=0;
    while(!initFirebase()&&tries<20){await new Promise(r=>setTimeout(r,200));tries++;}
    if(!fbDb){setErr("Δεν φορτώθηκε η σύνδεση. Δοκίμασε ξανά.");setLoading(false);return;}
    try{
      const code=Math.random().toString(36).slice(2,8).toUpperCase();
      const ref=await fbDb.collection("groups").add({
        name:groupName.trim(),
        code,
        owner:user.uid,
        createdAt:new Date().toISOString(),
        members:{[user.uid]:{name:user.displayName||user.email,email:user.email,role:"admin",joinedAt:new Date().toISOString()}}
      });
      await fbDb.collection("users").doc(user.uid).set({groupId:ref.id,groupRole:"admin"},{merge:true});
      onGroup(ref.id,"admin");

    setLoading(false);
