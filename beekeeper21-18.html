// Global QueenBeeIcon SVG
function getActionVal(actions,lbl){
  if(!actions)return null;
  const act=ACTIONS.find(a=>a.label===lbl);
  if(!act||!actions[act.key])return null;
  if(act.hasNum&&actions[act.key+"_val"])return actions[act.key+"_val"];
  if(act.hasSelect&&actions[act.key+"_sel"])return actions[act.key+"_sel"];
  return "✓";
}


function App(){
  const [authUser,setAuthUser]=useState(undefined); // undefined=loading, null=not logged in
  const [groupId,setGroupId]=useState(null);
  const [groupRole,setGroupRole]=useState(null); // admin | viewer
  const [groupInfo,setGroupInfo]=useState(null);
  const [syncStatus,setSyncStatus]=useState(""); // "", "saving", "saved", "error"

  // Auth listener — init Firebase first, fallback to offline mode after 3s
  useEffect(()=>{
    let resolved=false;
    const fallback=setTimeout(()=>{
      if(!resolved){resolved=true;setAuthUser(null);}
    },3000);
    const tryInit=setInterval(()=>{
      if(!initFirebase())return;
      clearInterval(tryInit);
      clearTimeout(fallback);
      const unsub=fbAuth.onAuthStateChanged(async u=>{
        resolved=true;
        setAuthUser(u||null);
        if(u){
          try{
            const userDoc=await fbDb.collection("users").doc(u.uid).get();
            if(userDoc.exists&&userDoc.data().groupId){
              setGroupId(userDoc.data().groupId);
              setGroupRole(userDoc.data().groupRole||"viewer");
            } else {
              setGroupId(null);
              setGroupRole(null);
            }
          }catch(e){console.error(e);}
        } else {
          setGroupId(null);
          setGroupRole(null);
        }
      });
    },200);
    return ()=>{clearInterval(tryInit);clearTimeout(fallback);};
  },[]);

  // Load group info
  useEffect(()=>{
    if(!groupId)return;
    if(!initFirebase())return;
    return fbDb.collection("groups").doc(groupId).onSnapshot(snap=>{
      if(snap.exists){
        setGroupInfo(snap.data());
        // Update role real-time if changed
        if(authUser&&snap.data().members&&snap.data().members[authUser.uid]){
          const newRole=snap.data().members[authUser.uid].role||"viewer";
          setGroupRole(newRole);
        }
      }
    });
  },[groupId]);

  const isViewer=groupRole==="viewer";

  // Show loading
  if(authUser===undefined)return div({style:{minHeight:"100vh",background:G.wax,display:"flex",alignItems:"center",justifyContent:"center"}},
    div({style:{fontSize:48}},"🍯")
  );

  // Show auth screen (only if Firebase loaded)
  if(!authUser){
    if(typeof firebase==="undefined")return h(AppMain,{groupId:null,groupRole:"admin",isViewer:false,authUser:null,groupInfo:null,onSignOut:()=>{}});
    return h(AuthScreen,{onAuth:()=>{}});
  }

  // Show group screen (only if Firebase loaded)
  if(!groupId){
    if(typeof firebase==="undefined")return h(AppMain,{groupId:null,groupRole:"admin",isViewer:false,authUser:null,groupInfo:null,onSignOut:()=>{}});
    return h(GroupScreen,{user:authUser,onGroup:(gid,role)=>{setGroupId(gid);setGroupRole(role);}});
  }

  // Main app with Firestore sync
  return h(AppMain,{groupId,groupRole,isViewer,authUser,groupInfo,
    onSignOut:async()=>{initFirebase();if(fbAuth)await fbAuth.signOut();setGroupId(null);setGroupRole(null);setGroupInfo(null);}
  });
}

function AppMain({groupId,groupRole,isViewer,authUser,groupInfo,onSignOut}){
  const groupIdRef=useRef(groupId);
  groupIdRef.current=groupId; // Always sync, not just on change

  // State
  const [hives,setHR]=useState(()=>groupId?[]:lsGet("bk_hives").map(h=>{
    if(!h.levels||h.levels.length===0)return h;
    const needsMigration=h.levels.some(l=>!l.type||!l.maxFrames);
    if(!needsMigration)return h;
    const newLevels=h.levels.map((l,i)=>{
      const defaultMax=h.langstrothSize?parseInt(h.langstrothSize)||10:10;
      const t=l.type||(l.isFloor===true?'floor':(l.isFloor===false?'roof':(i===0?'floor':'roof')));
      return Object.assign({},l,{type:t,maxFrames:l.maxFrames||defaultMax,frames:l.frames||"",symbolShape:t==='floor'?(l.symbolShape||(i===0?h.symbolShape||'Κύκλος':l.symbolShape||'Κύκλος')):'',symbolColor:t==='floor'?(l.symbolColor||(i===0?h.symbolColor||'':l.symbolColor||'')):'',symbolNumber:t==='floor'?(l.symbolNumber||(i===0?h.symbolNumber||'':l.symbolNumber||'')):'',});
    });
    return Object.assign({},h,{levels:newLevels});
  }));
  const [insps,setIR]=useState(()=>groupId?[]:lsGet("bk_insps"));
  const [syncMsg,setSyncMsg]=useState("");
  const [dbLoaded,setDbLoaded]=useState(false);
  const [showMembers,setShowMembers]=useState(false);

  const fbSaveMisc=async(key,data)=>{
    const gid=groupIdRef.current;
    const db=fbDb;
    if(!gid||!db)return;
    try{await db.collection("groups").doc(gid).collection("misc").doc(key).set({data:JSON.stringify(data),updatedAt:new Date().toISOString()});}catch(e){console.error("fbSaveMisc",e);}
  };
  const fbWatchMisc=(key,cb)=>{
    const gid=groupIdRef.current;
    const db=fbDb;
    if(!gid||!db)return ()=>{};
    return db.collection("groups").doc(gid).collection("misc").doc(key)
      .onSnapshot(snap=>{if(snap.exists&&snap.data().data){try{cb(JSON.parse(snap.data().data));}catch{}}});
  };

  // Firestore real-time sync
  useEffect(()=>{
    if(!groupId)return;
    if(!initFirebase())return;
    const unsub1=fbDb.collection("groups").doc(groupId).collection("hives")
      .onSnapshot(async snap=>{
        const fbHives=snap.docs.map(d=>({id:d.id,...d.data()}));
        if(fbHives.length===0){
          const lsHives=lsGet("bk_hives");
          if(lsHives&&lsHives.length>0){
            for(const hive of lsHives)
              await fbDb.collection("groups").doc(groupId).collection("hives").doc(hive.id).set(hive);
            return;
          }
        }
        setHR(fbHives);
        setDbLoaded(true);
      });
    const unsub2=fbDb.collection("groups").doc(groupId).collection("insps")
      .onSnapshot(async snap=>{
        const fbInsps=snap.docs.map(d=>({id:d.id,...d.data()}));
        if(fbInsps.length===0){
          const lsInsps=lsGet("bk_insps");
          if(lsInsps&&lsInsps.length>0){
            for(const insp of lsInsps)
              await fbDb.collection("groups").doc(groupId).collection("insps").doc(insp.id).set(insp);
            return;
          }
        }
        setIR(fbInsps);
      });
    return ()=>{unsub1();unsub2();};
  },[groupId]);

  const fbSave=async(col,id,data)=>{
    const gid=groupIdRef.current;
    if(!gid){setSyncMsg("\u26a0\ufe0f no groupId");setTimeout(()=>setSyncMsg(""),4000);return;}
    if(!fbDb){setSyncMsg("\u26a0\ufe0f no fbDb");setTimeout(()=>setSyncMsg(""),4000);return;}
    setSyncMsg("\ud83d\udcbe "+col);
    try{
      await fbDb.collection("groups").doc(gid).collection(col).doc(id).set(data);
      setSyncMsg("\u2713 "+col+" OK");setTimeout(()=>setSyncMsg(""),3000);
    }catch(e){setSyncMsg("\u26a0\ufe0f "+e.message);setTimeout(()=>setSyncMsg(""),5000);}
  };
  const fbDel=async(col,id)=>{
    const gid=groupIdRef.current;
    if(!gid||!fbDb)return;
    try{await fbDb.collection("groups").doc(gid).collection(col).doc(id).delete();}catch{}
  };

  const setH=u=>{
    if(isViewer)return;
    setHR(p=>{
      const n=typeof u==="function"?u(p):u;
      lsSet("bk_hives",n);
      n.forEach(hive=>{const old=p.find(x=>x.id===hive.id);if(!old||JSON.stringify(old)!==JSON.stringify(hive))fbSave("hives",hive.id,hive);});
      p.forEach(hive=>{if(!n.find(x=>x.id===hive.id))fbDel("hives",hive.id);});
      return n;
    });
  };
  const setI=u=>{
    if(isViewer)return;
    setIR(p=>{
      const n=typeof u==="function"?u(p):u;
      lsSet("bk_insps",n);
      n.forEach(insp=>{const old=p.find(x=>x.id===insp.id);if(!old||JSON.stringify(old)!==JSON.stringify(insp))fbSave("insps",insp.id,insp);});
      p.forEach(insp=>{if(!n.find(x=>x.id===insp.id))fbDel("insps",insp.id);});
      return n;
    });
  };
  const [view,setView]=useState("dashboard");
  const [selH,setSelH]=useState(null);
  const [collapsedLocs,setCollapsedLocs]=useState({});
  const [showHF,setShowHF]=useState(false);
  const [showIF,setShowIF]=useState(false);
  const [editI,setEditI]=useState(null);
  const [editH,setEditH]=useState(null);
  const [confirmDel,setConfirmDel]=useState(null); // {message, onConfirm}
  const [showNewInspPicker,setShowNewInspPicker]=useState(false);
  const [globalCustom,setGlobalCustomRaw]=useState(()=>{try{const v=localStorage.getItem("bk_custom_actions");return v?JSON.parse(v):{}}catch{return{}}});
  const setGlobalCustom=fn=>{setGlobalCustomRaw(p=>{const next=typeof fn==="function"?fn(p):fn;try{localStorage.setItem("bk_custom_actions",JSON.stringify(next))}catch{}return next;});};
  const [inspLogNotes,setInspLogNotes]=useState(()=>{try{const v=localStorage.getItem("bk_insp_notes");return v?JSON.parse(v):{}}catch{return{}}});
  useEffect(()=>{
    if(!groupId||!fbWatchMisc)return;
    return fbWatchMisc("inspNotes",data=>{setInspLogNotes(data);});
  },[groupId]);
  useEffect(()=>{try{localStorage.setItem("bk_insp_notes",JSON.stringify(inspLogNotes))}catch{}if(groupId&&fbSaveMisc)fbSaveMisc("inspNotes",inspLogNotes);},[inspLogNotes]);
  const cur=hives.find(h=>h.id===selH);
  const saveH=f=>{
    if(editH){
      const updated=Object.assign({},editH,f,{id:editH.id,_v:(Date.now())});
      setH(h=>h.map(x=>x.id===editH.id?updated:x));
      setEditH(null);
      if(editI||selH)setShowIF(true);
    }else{
      setH(h=>[...h,Object.assign({},f,{id:Date.now()+""})]);
    }
    setShowHF(false);
  };
  const saveI=inspData=>{
    const hiveId=editI?editI.hiveId:selH;
    // Save inspection
    if(editI){setI(i=>i.map(x=>x.id===editI.id?Object.assign({},x,inspData):x));setEditI(null);}
    else setI(i=>[...i,Object.assign({},inspData,{id:Date.now()+"",hiveId})]);
    setShowIF(false);
    // Apply location change if set
    const acts=inspData.actions&&typeof inspData.actions==="object"?inspData.actions:{};
    if(acts.changeLocation&&acts.changeLocation_val&&acts.changeLocation_val.trim()){
      setH(hv=>hv.map(h=>h.id===hiveId?Object.assign({},h,{location:acts.changeLocation_val.trim()}):h));
    }
    // Sync number of levels (add new floors) but keep existing colors/frames
    const hiveInsps=insps.filter(i=>i.hiveId===hiveId);
    const isLatest=!editI||hiveInsps.every(i=>i.id===editI.id||i.date<=inspData.date);
    if(isLatest&&inspData.levelData&&inspData.levelData.length>0){
      setH(hv=>hv.map(h=>{
        if(h.id!==hiveId)return h;
        const existing=h.levels||[];
        // Only add new levels if inspection has more — keep all existing data
        if(inspData.levelData.length<=existing.length)return h;
        const newLevels=inspData.levelData.map((lv,idx)=>{
          const ex=existing[idx];
          return ex?ex:{label:lv.label,frames:"",color:""};
        });
        return Object.assign({},h,{levels:newLevels});
      }));
    }
  };
  const delI=id=>setConfirmDel({message:"Διαγραφή επιθεώρησης;",onConfirm:()=>{setI(i=>i.filter(x=>x.id!==id));setConfirmDel(null)}});
  const delH=id=>setConfirmDel({message:"Διαγραφή κυψέλης και όλων των επιθεωρήσεών της;",onConfirm:()=>{setH(h=>h.filter(x=>x.id!==id));setI(i=>i.filter(x=>x.hiveId!==id));if(selH===id){setSelH(null);setView("dashboard")};setConfirmDel(null)}});
  const goBack=()=>{setView("dashboard");setSelH(null);setShowIF(false);setEditI(null)};

  return div({style:{minHeight:"100vh",background:`radial-gradient(ellipse at 20% 10%,${G.honeyLight}22 0%,transparent 60%),radial-gradient(ellipse at 80% 90%,${G.amber}15 0%,transparent 60%),${G.wax}`,fontFamily:"Georgia,serif",color:G.text,paddingBottom:60}},
    // Header
    div({style:{background:`linear-gradient(135deg,${G.beeBlack},${G.bark})`,padding:"8px 12px 6px",position:"sticky",top:0,zIndex:100,boxShadow:`0 2px 12px ${G.amber}33`}},
      div({style:{maxWidth:720,margin:"0 auto"}},
        // Row 1: title + back + add button
        div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}},
          div({style:{display:"flex",alignItems:"center",gap:8}},
            view!=="dashboard"?btn({onClick:goBack,style:{background:G.honey+"22",border:`1px solid ${G.honey}44`,borderRadius:8,color:G.honeyLight,fontSize:16,width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},"←"):null,
            div({style:{display:"flex",flexDirection:"column"}},
              div({style:{fontSize:16,fontWeight:900,color:G.honeyLight,letterSpacing:-0.3}},"🍯 Μελισσοκομικό Ημερολόγιο"),
              groupInfo?div({style:{fontSize:10,color:G.honey+"99",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
                span({},"👥 "+(groupInfo.name||"")),
                span({style:{color:isViewer?"#fca5a5":"#86efac"}},(isViewer?"👁 Θεατής":"✏️ Admin")),
                !isViewer&&groupInfo.code?span({style:{background:G.honey+"33",borderRadius:4,padding:"1px 5px",fontWeight:700,letterSpacing:1,color:G.honeyLight,cursor:"pointer"},onClick:()=>{try{navigator.clipboard.writeText(groupInfo.code);}catch{}alert("Κωδικός πρόσκλησης: "+groupInfo.code);}},"🔑 "+groupInfo.code):null,
                !isViewer?btn({onClick:()=>setShowMembers(true),style:{background:"none",border:"none",cursor:"pointer",fontSize:12,color:G.honeyLight,padding:"0 2px"}},"👥"):null,
                syncMsg?span({style:{color:"#86efac"}},syncMsg):null,
                btn({onClick:onSignOut,style:{background:"none",border:"none",cursor:"pointer",fontSize:10,color:G.honey+"88",fontFamily:"Georgia,serif",padding:"0 0 0 4px"}},"↩")
              ):null
            )
          ),
          h(Btn,{small:true,variant:"s",style:{background:G.honey+"22",color:G.honeyLight,border:`1px solid ${G.honey}44`,padding:"4px 10px",fontSize:12},onClick:()=>{setShowHF(true);setEditH(null)}},"+ Κυψέλη")
        ),
        // Row 2: nav + actions + hive count + summary + new insp
        div({style:{display:"flex",gap:3,flexWrap:"wrap",alignItems:"center"}},
          // Nav buttons
          ...[
            {id:"dashboard",label:"🏠 Ταμπλό"},
            {id:"all",label:"📋 Σύνοψη"},
            {id:"queens",label:"👑 Βασίλισσες"},
            {id:"summary",label:"🥚🍯"},
            {id:"finance",label:"⚖️"},
            {id:"harvest",label:"🍯 Τρύγος"},
            {id:"log",label:"📅 Επιθεωρήσεις"},
            {id:"help",label:"❓"},
          ].map(t=>btn({key:t.id,
            onTouchEnd:e=>{e.preventDefault();setView(t.id);setSelH(null);},
            onClick:e=>{if(e.pointerType!=="touch"){setView(t.id);setSelH(null);}},
            style:{padding:"3px 7px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,fontWeight:700,
              background:view===t.id?G.honey+"55":"transparent",
              color:view===t.id?G.honeyLight:G.honey+"99",WebkitTapHighlightColor:"transparent"}},t.label)),
          // Separator
          div({style:{width:1,height:14,background:G.honey+"33",flexShrink:0,margin:"0 1px"}}),
          // Hive count
          (()=>{
            const count=hives.reduce((n,hv)=>{
              const flrs=(hv.levels||[]).filter(l=>l.type==="floor"||l.isFloor);
              return n+(flrs.length>1?flrs.length:1);
            },0);
            return div({style:{fontSize:10,fontWeight:700,color:G.honey+"cc",padding:"3px 6px"}},"🏠 "+count);
          })(),
          // New inspection
          btn({onTouchEnd:e=>{e.preventDefault();setShowNewInspPicker(true);},onClick:e=>{if(e.pointerType!=="touch")setShowNewInspPicker(true);},style:{padding:"3px 7px",borderRadius:7,border:`1px solid ${G.honey}44`,cursor:"pointer",fontFamily:"Georgia,serif",fontSize:10,fontWeight:700,background:G.honey+"22",color:G.honeyLight,WebkitTapHighlightColor:"transparent"}},"+ Επιθεώρηση"),
          // Separator
          div({style:{width:1,height:14,background:G.honey+"33",flexShrink:0,margin:"0 1px"}}),
          // Hive symbols
          ...[...hives].sort((a,b)=>(+a.symbolNumber||0)-(+b.symbolNumber||0)).map(hv=>
            btn({key:hv.id,
              onTouchEnd:e=>{e.preventDefault();setSelH(hv.id);setView("hive");},
              onClick:e=>{if(e.pointerType!=="touch"){setSelH(hv.id);setView("hive");}},
              style:{padding:"2px 4px",borderRadius:7,border:"none",cursor:"pointer",
                background:selH===hv.id?G.honey+"44":"transparent",
                outline:selH===hv.id?`1.5px solid ${G.honey}`:"none",
                outlineOffset:1,WebkitTapHighlightColor:"transparent"}},
              h(HiveSymbols,{hive:hv,size:20})
            )
          )
        )
      )
    ),
    showNewInspPicker?h(NewInspPicker,{hives,onClose:()=>setShowNewInspPicker(false),onPick:hv=>{setSelH(hv.id);setShowNewInspPicker(false);setShowIF(true);setEditI(null);}}):null,
    confirmDel?h(ConfirmModal,{message:confirmDel.message,onConfirm:confirmDel.onConfirm,onCancel:()=>setConfirmDel(null)}):null,
    div({style:{maxWidth:720,margin:"0 auto",padding:"20px 16px"}},
      (showHF||editH)?div({style:{position:"fixed",inset:0,zIndex:700,background:"#0007",display:"flex",alignItems:"flex-end",justifyContent:"center"},onClick:e=>{if(e.target===e.currentTarget){setShowHF(false);setEditH(null);}}},
        div({style:{width:"100%",maxWidth:720,maxHeight:"90vh",overflowY:"auto",
          background:G.white,borderRadius:"20px 20px 0 0",
          padding:"20px 16px 40px",boxShadow:"0 -8px 32px #0004",
          position:"relative",zIndex:1},onClick:e=>e.stopPropagation()},
          h(HiveForm,{initial:editH,onSave:saveH,onDelete:editH?()=>delH(editH.id):null,onCancel:()=>{setShowHF(false);setEditH(null)}})
        )
      ):null,
      (showIF||editI)&&cur?div({style:{marginBottom:20}},h(InspForm,{hiveName:cur.name,hiveSymbol:{shape:cur.symbolShape,color:cur.symbolColor,number:cur.symbolNumber},hiveLevels:cur.levels,hives,globalCustom,setGlobalCustom,hiveLangstrothSize:cur.langstrothSize,hiveData:cur,onSaveHive:updatedHive=>{const merged=Object.assign({},cur,updatedHive,{id:cur.id});setH(hv=>hv.map(h=>h.id===cur.id?merged:h));},onEditHive:()=>{setShowIF(false);setEditH(cur);},onDeleteHive:()=>delH(cur.id),initial:editI,lastInsp:!editI?insps.filter(i=>i.hiveId===selH).sort((a,b)=>b.date.localeCompare(a.date))[0]:null,onSave:saveI,onCancel:()=>{setShowIF(false);setEditI(null)}})):null,
      // (Nav moved to header)
      // Dashboard
      view==="dashboard"?h(Fragment,null,
        hives.length===0?h(Card,{style:{textAlign:"center",padding:50}},
          div({style:{fontSize:50,marginBottom:12}},"🏠"),
          div({style:{fontWeight:700,fontSize:18,marginBottom:8}},"Δεν υπάρχουν κυψέλες ακόμα"),
          div({style:{color:G.textLight,marginBottom:20}},"Ξεκινήστε προσθέτοντας την πρώτη σας κυψέλη"),
          h(Btn,{onClick:()=>setShowHF(true)},"+ Προσθήκη Κυψέλης")
        ):(()=>{
          // Compute nuc parent links once for all hives (not per HiveCard)
          // nucLinks: motherHiveId → daughterHive object
          const nucLinks={};
          insps.forEach(i=>{
            const acts=i.actions||{};
            const nuc_hive=acts.nuc_hive||(i.floorData&&i.floorData.find(fd=>fd.actions&&fd.actions.nuc_hive)&&i.floorData.find(fd=>fd.actions&&fd.actions.nuc_hive).actions.nuc_hive);
            if(acts.nuc&&nuc_hive){
              nucLinks[nuc_hive]=i.hiveId; // mother → daughter
            }
          });
          const sorted=[...hives].sort((a,b)=>(+a.symbolNumber||0)-(+b.symbolNumber||0));
          const locMap=[];const seen={};
          sorted.forEach(hv=>{const loc=hv.location&&hv.location.trim()||"—";if(!seen[loc]){seen[loc]=true;locMap.push({loc,hives:[]});}locMap.find(g=>g.loc===loc).hives.push(hv);});
          return div({},
            ...locMap.map(({loc,hives:grpHives})=>{
              const isOpen=!collapsedLocs[loc];
              return div({key:loc},
                btn({
                  onTouchEnd:e=>{e.preventDefault();setCollapsedLocs(p=>({...p,[loc]:!p[loc]}));},
                  onClick:e=>{if(e.pointerType!=="touch")setCollapsedLocs(p=>({...p,[loc]:!p[loc]}));},
                  style:{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"6px 10px",border:"none",borderBottom:`2px solid ${G.honey}66`,
                    background:G.wax,cursor:"pointer",fontFamily:"Georgia,serif",
                    WebkitTapHighlightColor:"transparent"}},
                  div({style:{display:"flex",alignItems:"center",gap:6}},
                    span({style:{fontSize:13,fontWeight:800,color:G.amber}},"📍 "+loc),
                    span({style:{fontSize:11,color:G.textLight,fontWeight:600}},"("+grpHives.length+")")
                  ),
                  span({style:{fontSize:12,color:G.textLight}},(isOpen?"▾":"▸"))
                ),
                isOpen?div({style:{display:"grid",gap:0}},
                  ...grpHives.map(hv=>{
                    const parentHiveId=nucLinks[hv.id];
                    const parentHive=parentHiveId?hives.find(h=>h.id===parentHiveId):null;
                    return h(HiveCard,{key:hv.id,hive:hv,inspections:insps,hives,nucParentHive:parentHive,selected:selH===hv.id,onSelect:id=>{setSelH(id);setView("hive")}});
                  })
                ):null
              );
            })
          );
        })()
      ):null,
      // All inspections
      view==="all"?h(InspStats,{insps,hives}):null,
      view==="queens"?h(QueenPanel,{hives,insps,onClose:()=>setView("dashboard"),asView:true}):null,
      view==="summary"?h(GlobalSummaryPanel,{hives,insps,onClose:()=>setView("dashboard"),asView:true}):null,
      view==="log"?h(InspLogPanel,{hives,insps,onClose:()=>setView("dashboard"),asView:true,fbSaveMisc,fbWatchMisc,onSaveNote:(date,note)=>{setInspLogNotes(p=>({...p,[date]:note}));}}):null,
      view==="finance"?h(FinancePanel,{onClose:()=>setView("dashboard"),asView:true,fbSaveMisc,fbWatchMisc}):null,
      view==="harvest"?h(HarvestPanel,{hives,asView:true,fbSaveMisc,fbWatchMisc}):null,
      view==="help"?h(HelpPanel,{asView:true}):null,
      // Single hive — summary + date filter + history
      view==="hive"&&cur?h(HiveHistory,{hive:cur,insps,hives,onEdit:insp=>{setEditI(insp);setShowIF(false)},onDelete:delI,onNewInsp:()=>{setEditI(null);setShowIF(true);}}):null,
    // Members management modal
    showMembers&&!isViewer&&groupInfo?div({style:{position:"fixed",inset:0,zIndex:800,background:"#0007",display:"flex",alignItems:"center",justifyContent:"center",padding:16}},
      div({style:{background:G.white,borderRadius:16,padding:24,width:"100%",maxWidth:400,maxHeight:"80vh",overflowY:"auto"}},
        div({style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
          div({style:{fontWeight:900,fontSize:16,color:G.amber}},"👥 Μέλη Ομάδας"),
          btn({onClick:()=>setShowMembers(false),style:{background:"none",border:"none",cursor:"pointer",fontSize:20,color:G.textLight}},"✕")
        ),
        ...Object.entries(groupInfo.members||{}).map(([uid,m])=>
          div({key:uid,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:"1px solid "+G.waxDark+"44"}},
            div({style:{flex:1}},
              div({style:{fontWeight:700,fontSize:14,color:G.text}},m.name||m.email),
              div({style:{fontSize:11,color:G.textLight}},m.email)
            ),
            div({style:{display:"flex",gap:6,alignItems:"center"}},
              span({style:{fontSize:11,color:m.role==="admin"?"#86efac":"#fca5a5",fontWeight:700}},m.role==="admin"?"✏️ Admin":"👁 Θεατής"),
              uid!==authUser.uid?btn({
                onTouchEnd:e=>{e.preventDefault();(async()=>{
                  if(!initFirebase())return;
                  const newRole=m.role==="admin"?"viewer":"admin";
                  try{
                    await fbDb.collection("groups").doc(groupId).update({[`members.${uid}.role`]:newRole});
                    await fbDb.collection("users").doc(uid).set({groupRole:newRole},{merge:true});
                  }catch(e){alert("Σφάλμα: "+e.message);}
                })();},
                onClick:()=>{(async()=>{
                  if(!initFirebase())return;
                  const newRole=m.role==="admin"?"viewer":"admin";
                  try{
                    await fbDb.collection("groups").doc(groupId).update({[`members.${uid}.role`]:newRole});
                    await fbDb.collection("users").doc(uid).set({groupRole:newRole},{merge:true});
                  }catch(e){alert("Σφάλμα: "+e.message);}
                })();},
                style:{padding:"4px 10px",borderRadius:8,border:"1px solid "+G.waxDark,background:G.wax,cursor:"pointer",fontSize:11,fontWeight:700,color:G.bark,fontFamily:"Georgia,serif",WebkitTapHighlightColor:"transparent"}
              },m.role==="admin"?"→ Θεατής":"→ Admin"):span({style:{fontSize:10,color:G.textLight}},"(εσύ)")
            )
          )
        )
      )
    ):null
    )
  )
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  componentDidCatch(e,info){
    const box=document.createElement('div');
    box.style.cssText='position:fixed;bottom:60px;left:0;right:0;background:#c00;color:#fff;padding:8px;font-size:11px;z-index:99999;word-break:break-all;max-height:150px;overflow:auto;';
    box.textContent='React: '+(e&&e.message||String(e))+'\n'+(info&&info.componentStack?info.componentStack.slice(0,200):'');
    document.body.appendChild(box);
    setTimeout(()=>box.remove(),12000);
  }
  render(){return this.state.err?h('div',{style:{padding:20,color:'red'}},'Error: '+this.state.err.message):this.props.children;}
}
ReactDOM.createRoot(document.getElementById("root")).render(h(ErrorBoundary,null,h(App,null)));
</script>
</body>
